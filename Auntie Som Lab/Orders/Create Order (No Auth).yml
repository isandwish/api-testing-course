info:
  name: Create Order (No Auth)
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/orders"
  body:
    type: json
    data: |-
      {
        "itemId": 1,
        "quantity": 1
      }
  auth:
    type: bearer
    token: ""

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        test("Status = 401", () => {
          expect(res.getStatus()).to.equal(401);
        });

        test("Should return Unauthorized error message", () => {
          expect(body).to.not.be.null;
          expect(body.error).to.equal("Unauthorized");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
