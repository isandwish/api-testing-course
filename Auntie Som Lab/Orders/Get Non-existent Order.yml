info:
  name: Get Non-existent Order
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/orders/999"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();

        test("Status = 404", () => {
          expect(res.getStatus()).to.equal(404);
        });

        test("Should return Out of stock error message", () => {
          expect(body).to.not.be.null;
          expect(body.error).to.equal("Order not found");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
